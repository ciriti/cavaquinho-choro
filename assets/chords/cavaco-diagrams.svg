      .barre { fill: #3c4040; }
      .open { fill: transparent; stroke: rgba(240, 230, 208, 0.95); stroke-width: 2; }
      .finger-label {
        fill: #6a6a6a;
        font-family: Georgia, serif;
        font-size: 10px;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .fret-label {
        fill: #9a8870;
        font-family: Georgia, serif;
        font-size: 13px;
        font-weight: 600;
        transform: translate(-14px, 0);
